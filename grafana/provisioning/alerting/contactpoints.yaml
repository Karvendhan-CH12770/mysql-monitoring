apiVersion: 1

# =============================================================================
# Contact Points
#
# To add a new team: add a new entry here + add a route in notificationpolicies.yaml
# addresses = static email address for each team
# =============================================================================

contactPoints:

  # Global archive - receives a copy of EVERY alert
  - orgId: 1
    name: global-archive
    receivers:
      - uid: cp-global-archive
        type: email
        disableResolveMessage: false
        settings:
          addresses: zAppDevInternal@corrohealth.com
          singleEmail: true
          subject: '{{ template "alert_subject" . }}'

