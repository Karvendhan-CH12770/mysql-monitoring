apiVersion: 1

# =============================================================================
# Contact Points
#
# message field is intentionally omitted — Grafana Unified Alerting picks up
# the "email.default.html" template automatically from templates.yaml and uses
# it as the full HTML email body.
# =============================================================================

contactPoints:

  # Global archive - receives a copy of EVERY alert
  - orgId: 1
    name: global-archive
    receivers:
      - uid: cp-global-archive
        type: email
        disableResolveMessage: false
        settings:
          addresses: karvendhan.nagaraj@corrohealth.com
          singleEmail: true
          subject: '{{ template "alert_subject" . }}'

