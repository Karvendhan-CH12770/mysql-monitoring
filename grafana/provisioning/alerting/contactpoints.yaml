apiVersion: 1

# =============================================================================
# Contact Points — DO NOT EDIT THIS FILE when adding new teams/servers.
#
# To add a new server with its own email, only edit templates.yaml.
#
# This file has exactly two contact points:
#   1. global-archive  — receives a copy of EVERY alert (fixed email)
#   2. team-router     — reads the email address from the team_email template
#                        in templates.yaml based on the `team` label
# =============================================================================

contactPoints:

  # Central archive — copy of every alert regardless of team
  - orgId: 1
    name: global-archive
    receivers:
      - uid: cp-global-archive
        type: email
        disableResolveMessage: false
        settings:
          addresses: monitoring-archive@yourcompany.com
          singleEmail: true
          subject: '{{ template "alert_subject" . }}'
          message: '{{ template "alert_body" . }}'

  # Dynamic team router — email address is resolved from templates.yaml
  - orgId: 1
    name: team-router
    receivers:
      - uid: cp-team-router
        type: email
        disableResolveMessage: false
        settings:
          addresses: '{{ template "team_email" . }}'
          singleEmail: true
          subject: '{{ template "alert_subject" . }}'
          message: '{{ template "alert_body" . }}'
