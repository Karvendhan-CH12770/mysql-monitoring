apiVersion: 1

# =============================================================================
# Notification Policies — DO NOT EDIT THIS FILE when adding new teams/servers.
#
# To add a new server with its own email, only edit templates.yaml.
#
# ROUTING:
#   Every alert → global-archive (archive copy, continue: true)
#              → team-router     (team email resolved from templates.yaml)
#
# SEVERITY TIMING:
#   critical → group_wait: 10s  | repeat: 30m
#   warning  → group_wait: 30s  | repeat: 2h
#   info     → group_wait: 30s  | repeat: 12h
# =============================================================================

policies:
  - orgId: 1
    receiver: team-router
    group_by: [alertname, team, severity, instance]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

    routes:

      # Send a copy of every alert to the global archive first
      - receiver: global-archive
        continue: true
        group_by: [alertname, team, severity]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

      # Critical alerts — fast repeat
      - receiver: team-router
        object_matchers: [[severity, =, critical]]
        group_wait: 10s
        repeat_interval: 30m

      # Warning alerts
      - receiver: team-router
        object_matchers: [[severity, =, warning]]
        group_wait: 30s
        repeat_interval: 2h

      # Info alerts — slow repeat
      - receiver: team-router
        object_matchers: [[severity, =, info]]
        group_wait: 30s
        repeat_interval: 12h
