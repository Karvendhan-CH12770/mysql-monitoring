apiVersion: 1

# =============================================================================
# Notification Policies
#
# ROUTING:
#   Every alert → global-archive (archive copy, continue: true)
#              → matched team contact point (by team label)
#
# To add a new team: add a new route entry below + add contact point in contactpoints.yaml
#
# SEVERITY TIMING:
#   critical → group_wait: 10s  | repeat: 30m
#   warning  → group_wait: 30s  | repeat: 2h
#   info     → group_wait: 30s  | repeat: 12h
# =============================================================================

policies:
  - orgId: 1
    receiver: global-archive
    group_by: [alertname, team, severity, instance]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

    routes:

      # Send a copy of every alert to the global archive
      - receiver: global-archive
        continue: true
        group_by: [alertname, team, severity]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

      # Team routing by label — critical
      - receiver: apache-team
        object_matchers: [[team, =, apache-team], [severity, =, critical]]
        group_wait: 10s
        repeat_interval: 30m

      - receiver: web-team
        object_matchers: [[team, =, web-team], [severity, =, critical]]
        group_wait: 10s
        repeat_interval: 30m

      - receiver: dba-team
        object_matchers: [[team, =, dba-team], [severity, =, critical]]
        group_wait: 10s
        repeat_interval: 30m

      - receiver: infra-team
        object_matchers: [[team, =, infra-team], [severity, =, critical]]
        group_wait: 10s
        repeat_interval: 30m

      - receiver: nodejs-team
        object_matchers: [[team, =, nodejs-team], [severity, =, critical]]
        group_wait: 10s
        repeat_interval: 30m

      - receiver: platform
        object_matchers: [[team, =, platform], [severity, =, critical]]
        group_wait: 10s
        repeat_interval: 30m

      # Team routing by label — warning
      - receiver: apache-team
        object_matchers: [[team, =, apache-team], [severity, =, warning]]
        group_wait: 30s
        repeat_interval: 2h

      - receiver: web-team
        object_matchers: [[team, =, web-team], [severity, =, warning]]
        group_wait: 30s
        repeat_interval: 2h

      - receiver: dba-team
        object_matchers: [[team, =, dba-team], [severity, =, warning]]
        group_wait: 30s
        repeat_interval: 2h

      - receiver: infra-team
        object_matchers: [[team, =, infra-team], [severity, =, warning]]
        group_wait: 30s
        repeat_interval: 2h

      - receiver: nodejs-team
        object_matchers: [[team, =, nodejs-team], [severity, =, warning]]
        group_wait: 30s
        repeat_interval: 2h

      - receiver: platform
        object_matchers: [[team, =, platform], [severity, =, warning]]
        group_wait: 30s
        repeat_interval: 2h

      # Team routing by label — info
      - receiver: apache-team
        object_matchers: [[team, =, apache-team], [severity, =, info]]
        group_wait: 30s
        repeat_interval: 12h

      - receiver: web-team
        object_matchers: [[team, =, web-team], [severity, =, info]]
        group_wait: 30s
        repeat_interval: 12h

      - receiver: dba-team
        object_matchers: [[team, =, dba-team], [severity, =, info]]
        group_wait: 30s
        repeat_interval: 12h

      - receiver: infra-team
        object_matchers: [[team, =, infra-team], [severity, =, info]]
        group_wait: 30s
        repeat_interval: 12h

      - receiver: nodejs-team
        object_matchers: [[team, =, nodejs-team], [severity, =, info]]
        group_wait: 30s
        repeat_interval: 12h

      - receiver: platform
        object_matchers: [[team, =, platform], [severity, =, info]]
        group_wait: 30s
        repeat_interval: 12h
