apiVersion: 1

# =============================================================================
# Alert Rules — Application & Node.js Runtime
# Folder: Application / Node.js
#
# TEAM ROUTING:
#   The `team` label is NOT hardcoded here. It flows automatically from the
#   prometheus.yml scrape config target labels:
#     nodejs_applications job  →  team: nodejs-team  →  routes to nodejs-team contact point
#
#   NOTE: Aggregation expressions use  sum/avg by (instance, team) (...)
#   and  sum by (instance, le, team) (...)  to ensure the `team` label is
#   preserved through aggregations so routing works correctly.
#
# Application Rules:
#   1.  AppHighErrorRate          (critical) — HTTP 5xx error rate > 5%
#   2.  AppErrorRateWarning       (warning)  — HTTP 5xx error rate > 1%
#   3.  AppHighLatencyP99         (critical) — P99 latency > 1000ms
#   4.  AppLatencyP99Warning      (warning)  — P99 latency > 500ms
#   5.  AppInstanceDown           (critical) — service up == 0
#   6.  AppHighRequestRate        (info)     — request rate spike (>1000 rps)
#
# Node.js Rules:
#   7.  NodeJSHighHeapMemory      (critical) — heap usage > 90%
#   8.  NodeJSHeapMemoryWarning   (warning)  — heap usage > 75%
#   9.  NodeJSHighEventLoopLag    (warning)  — event loop lag > 500ms
#   10. NodeJSHighCPUUsage        (warning)  — process CPU > 80%
# =============================================================================

groups:

  # ---------------------------------------------------------------------------
  # Application Performance & Error Analysis Alert Rules
  # ---------------------------------------------------------------------------
  - orgId: 1
    name: Application Performance Alerts
    folder: Application
    interval: 1m
    rules:

      # -----------------------------------------------------------------------
      # 1. Application High Error Rate — CRITICAL (>5%)
      # sum by (instance, team) preserves team label through aggregation
      # -----------------------------------------------------------------------
      - uid: rule-app-high-error-rate
        title: AppHighErrorRate
        condition: C
        for: 2m
        isPaused: false
        noDataState: NoData
        execErrState: Error
        labels:
          severity: critical
        annotations:
          dashboard_name: Application Performance Monitoring
          host: "{{ $labels.instance }}"
          summary: "Application error rate critically high (>5%) on {{ $labels.instance }}"
          description: "HTTP 5xx error rate on {{ $labels.instance }} has exceeded 5% for 2 minutes."
          root_cause: >
            More than 5% of all HTTP requests to {{ $labels.instance }} are returning 5xx
            server-side error codes. Users are experiencing visible failures. Likely causes
            include: a recently deployed code change introducing an unhandled exception,
            an upstream dependency (database, cache, external API) becoming unavailable,
            an out-of-memory condition causing request processing failures, or invalid
            configuration causing handlers to throw errors.
          action_item: >
            1. Check application error logs immediately: sudo journalctl -u app -n 200 --no-pager or check /var/log/app/*.log.
            2. Look for exception stack traces — identify the failing endpoint or function.
            3. Check if a recent deployment correlates with the error spike (compare with deploy timeline in dashboard).
            4. Verify upstream dependencies: database connectivity, cache availability, external API status.
            5. If a bad deployment is suspected, initiate a rollback immediately.
            6. Check memory usage — OOM may be causing process restarts.
            7. Update the status page if user-facing impact is confirmed.
          dashboard_url: "http://localhost:3000/d/enterprise-app-error-analysis"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "sum by (instance, team) (rate(http_requests_total{status=~\"5..\"}[5m])) / sum by (instance, team) (rate(http_requests_total[5m])) * 100"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [5], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold

      # -----------------------------------------------------------------------
      # 2. Application Error Rate Warning (>1%)
      # sum by (instance, team) preserves team label through aggregation
      # -----------------------------------------------------------------------
      - uid: rule-app-error-rate-warning
        title: AppErrorRateWarning
        condition: C
        for: 5m
        isPaused: false
        noDataState: NoData
        execErrState: Error
        labels:
          severity: warning
        annotations:
          dashboard_name: Application Error Analysis
          host: "{{ $labels.instance }}"
          summary: "Application error rate elevated (>1%) on {{ $labels.instance }}"
          description: "HTTP 5xx error rate on {{ $labels.instance }} is between 1-5%."
          root_cause: >
            HTTP 5xx error rate on {{ $labels.instance }} has risen above 1%. A small but
            increasing number of user requests are failing server-side. This could indicate
            an emerging issue with an upstream dependency, a memory pressure situation,
            or intermittent exceptions in specific code paths triggered by certain inputs.
          action_item: >
            1. Check error logs for patterns: are errors concentrated on specific endpoints?
            2. Review error rate trend — is it growing or stable?
            3. Verify upstream dependencies are healthy.
            4. Check for increased response times that might indicate resource pressure.
          dashboard_url: "http://localhost:3000/d/enterprise-app-error-analysis"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "sum by (instance, team) (rate(http_requests_total{status=~\"5..\"}[5m])) / sum by (instance, team) (rate(http_requests_total[5m])) * 100"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [1], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold

      # -----------------------------------------------------------------------
      # 3. Application High P99 Latency — CRITICAL (>1000ms)
      # sum by (instance, le, team) preserves team label for histogram_quantile
      # -----------------------------------------------------------------------
      - uid: rule-app-latency-critical
        title: AppHighLatencyP99
        condition: C
        for: 3m
        isPaused: false
        noDataState: NoData
        execErrState: Error
        labels:
          severity: critical
        annotations:
          dashboard_name: Application Performance Monitoring
          host: "{{ $labels.instance }}"
          summary: "Application P99 latency critically high on {{ $labels.instance }} (>1000ms)"
          description: "P99 HTTP response latency on {{ $labels.instance }} exceeds 1 second."
          root_cause: >
            The 99th percentile response latency for {{ $labels.instance }} has exceeded 1 second.
            Almost all users are experiencing slow responses. Root causes include: N+1 database
            query problems causing excessive round-trips per request, a slow database query without
            a proper index, an external API dependency with increased response times, CPU or memory
            saturation causing queuing of request processing, or a garbage collection pause in the
            application runtime.
          action_item: >
            1. Review slow request traces in APM or application logs.
            2. Check database slow query log for queries taking >100ms.
            3. Verify external API dependencies: check their response times and error rates.
            4. Check CPU and memory utilization — resource saturation causes queuing.
            5. Review recent deployments for new database queries or inefficient algorithms.
            6. Consider enabling query caching for frequently accessed, read-heavy data.
          dashboard_url: "http://localhost:3000/d/enterprise-app-performance"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "histogram_quantile(0.99, sum by (instance, le, team) (rate(http_request_duration_seconds_bucket{route!~\".*metrics.*|.*health.*\"}[5m]))) * 1000"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [1000], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold

      # -----------------------------------------------------------------------
      # 4. Application P99 Latency Warning (>500ms)
      # sum by (instance, le, team) preserves team label for histogram_quantile
      # -----------------------------------------------------------------------
      - uid: rule-app-latency-warning
        title: AppLatencyP99Warning
        condition: C
        for: 5m
        isPaused: false
        noDataState: NoData
        execErrState: Error
        labels:
          severity: warning
        annotations:
          dashboard_name: Application Performance Monitoring
          host: "{{ $labels.instance }}"
          summary: "Application P99 latency elevated on {{ $labels.instance }} (>500ms)"
          description: "P99 HTTP response latency on {{ $labels.instance }} is between 500ms and 1000ms."
          root_cause: >
            P99 latency for {{ $labels.instance }} is above 500ms. While the application
            is still functional, a noticeable portion of user requests are experiencing
            slow responses that may be causing user frustration. This may escalate to
            the critical threshold if not addressed.
          action_item: >
            1. Check the latency trend in the Application Performance dashboard.
            2. Review database query performance — look for queries >50ms.
            3. Check for increased traffic volume that might be causing resource saturation.
          dashboard_url: "http://localhost:3000/d/enterprise-app-performance"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "histogram_quantile(0.99, sum by (instance, le, team) (rate(http_request_duration_seconds_bucket{route!~\".*metrics.*|.*health.*\"}[5m]))) * 1000"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [500], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold

      # -----------------------------------------------------------------------
      # 5. Application Instance Down — CRITICAL
      # -----------------------------------------------------------------------
      - uid: rule-app-instance-down
        title: AppInstanceDown
        condition: C
        for: 2m
        isPaused: false
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
        annotations:
          dashboard_name: Application Performance Monitoring
          host: "{{ $labels.instance }}"
          summary: "Application instance {{ $labels.instance }} is DOWN"
          description: "Application process {{ $labels.instance }} has stopped responding."
          root_cause: >
            The application process on {{ $labels.instance }} (job: {{ $labels.job }}) has
            stopped responding to Prometheus scrapes. The service may have crashed due to
            an unhandled exception, been killed by the OOM killer, experienced a fatal
            configuration error on startup, or the host itself may be unreachable.
          action_item: >
            1. Check service status: sudo systemctl status {{ $labels.job }}.
            2. Review application logs for the crash reason: sudo journalctl -u {{ $labels.job }} -n 100.
            3. Check for OOM kills: sudo dmesg | grep -i killed.
            4. Attempt restart: sudo systemctl restart {{ $labels.job }}.
            5. Verify the startup configuration is correct: environment variables, config files.
            6. If multiple instances are down, escalate immediately — traffic is not being served.
          dashboard_url: "http://localhost:3000/d/enterprise-app-performance"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "up{job=~\"nodejs.*|php-fpm|php|app.*|application.*\"}"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [1], type: lt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold

      # -----------------------------------------------------------------------
      # 6. Application High Request Rate — INFO (>1000 rps spike notification)
      # sum by (instance, team) preserves team label through aggregation
      # -----------------------------------------------------------------------
      - uid: rule-app-high-request-rate
        title: AppHighRequestRate
        condition: C
        for: 5m
        isPaused: false
        noDataState: NoData
        execErrState: Error
        labels:
          severity: info
        annotations:
          dashboard_name: Application Performance Monitoring
          host: "{{ $labels.instance }}"
          summary: "Application request rate spike on {{ $labels.instance }} (>1000 rps)"
          description: "Request throughput on {{ $labels.instance }} has exceeded 1000 requests per second."
          root_cause: >
            Request throughput on {{ $labels.instance }} has exceeded 1000 requests/second.
            This is an informational notification — the application is handling the traffic,
            but the volume is above typical operating levels. This may indicate a marketing
            campaign, a traffic redistribution from another instance failing, or a client
            misconfiguration sending duplicate requests.
          action_item: >
            1. Review the Application Performance dashboard for latency and error rate impact.
            2. Verify the traffic is legitimate — check traffic source distribution.
            3. Monitor worker/thread pool utilization to ensure it is not nearing saturation.
            4. No immediate action required unless error rates or latency are also elevated.
          dashboard_url: "http://localhost:3000/d/enterprise-app-performance"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "sum by (instance, team) (rate(http_requests_total[5m]))"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [1000], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold

  # ---------------------------------------------------------------------------
  # Node.js Application Alert Rules
  # ---------------------------------------------------------------------------
  - orgId: 1
    name: Node.js Runtime Alerts
    folder: Node.js
    interval: 1m
    rules:

      # -----------------------------------------------------------------------
      # 7. Node.js High Heap Memory — CRITICAL (>90%)
      # -----------------------------------------------------------------------
      - uid: rule-nodejs-heap-critical
        title: NodeJSHighHeapMemory
        condition: C
        for: 3m
        isPaused: false
        noDataState: NoData
        execErrState: Error
        labels:
          severity: critical
        annotations:
          dashboard_name: Node.js Runtime Monitoring
          host: "{{ $labels.instance }}"
          summary: "Node.js heap memory critically high on {{ $labels.instance }} (>90%)"
          description: "Node.js V8 heap usage on {{ $labels.instance }} exceeds 90% of the heap limit."
          root_cause: >
            The Node.js V8 heap on {{ $labels.instance }} is more than 90% full. The process
            is at risk of crashing with "FATAL ERROR: CALL_AND_RETRY_LAST Allocation failed
            - JavaScript heap out of memory". This is almost always caused by a memory leak —
            objects accumulating in memory without being garbage collected. Common sources:
            event listener accumulation without removal, circular references, large in-memory
            caches without TTL/eviction, or stream buffers not being consumed.
          action_item: >
            1. Trigger a manual GC if possible: global.gc() if --expose-gc flag is set.
            2. Immediately increase heap limit as a temporary measure: NODE_OPTIONS=--max-old-space-size=4096.
            3. Take a heap snapshot for analysis: node --heapsnapshot-signal=SIGUSR2 or use clinic.js.
            4. Analyze the snapshot in Chrome DevTools to identify the retaining path.
            5. Review recent code changes for new in-memory caches or unbounded data structures.
            6. Plan a rolling restart of the application to clear the heap as an emergency measure.
          dashboard_url: "http://localhost:3000/d/enterprise-nodejs-runtime"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "nodejs_heap_size_used_bytes / nodejs_heap_size_total_bytes * 100"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [90], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold

      # -----------------------------------------------------------------------
      # 8. Node.js Heap Memory Warning (>75%)
      # -----------------------------------------------------------------------
      - uid: rule-nodejs-heap-warning
        title: NodeJSHeapMemoryWarning
        condition: C
        for: 5m
        isPaused: false
        noDataState: NoData
        execErrState: Error
        labels:
          severity: warning
        annotations:
          dashboard_name: Node.js Runtime Monitoring
          host: "{{ $labels.instance }}"
          summary: "Node.js heap memory elevated on {{ $labels.instance }} (>75%)"
          description: "Node.js V8 heap usage on {{ $labels.instance }} is between 75-90%."
          root_cause: >
            Node.js heap utilization on {{ $labels.instance }} is above 75%. GC pressure is
            increasing and if the heap continues to grow, a critical OOM event may follow.
            Monitor for steady growth which indicates a memory leak pattern.
          action_item: >
            1. Check heap growth trend in the Node.js Runtime dashboard.
            2. Review if any new in-memory caches or large data structures were recently added.
            3. Monitor GC pause frequency — high GC activity alongside growth = likely leak.
            4. Plan to take a heap snapshot during the next maintenance window.
          dashboard_url: "http://localhost:3000/d/enterprise-nodejs-runtime"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "nodejs_heap_size_used_bytes / nodejs_heap_size_total_bytes * 100"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [75], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold

      # -----------------------------------------------------------------------
      # 9. Node.js High Event Loop Lag — WARNING (>500ms)
      # -----------------------------------------------------------------------
      - uid: rule-nodejs-event-loop-lag
        title: NodeJSHighEventLoopLag
        condition: C
        for: 3m
        isPaused: false
        noDataState: NoData
        execErrState: Error
        labels:
          severity: warning
        annotations:
          dashboard_name: Node.js Runtime Monitoring
          host: "{{ $labels.instance }}"
          summary: "Node.js event loop lag high on {{ $labels.instance }} (>500ms)"
          description: "Node.js event loop lag on {{ $labels.instance }} exceeds 500ms."
          root_cause: >
            The Node.js event loop on {{ $labels.instance }} is experiencing delays of over
            500ms. Event loop lag means the single-threaded JavaScript engine is spending
            time on synchronous, blocking operations instead of processing new events.
            Causes include: CPU-intensive synchronous operations blocking the loop (large
            JSON serialization, heavy crypto operations without worker threads), I/O
            starvation, or excessive microtask queue depth.
          action_item: >
            1. Identify blocking synchronous operations: use clinic.js flame or 0x profiler.
            2. Check for synchronous file I/O calls (fs.readFileSync, etc.) in hot code paths.
            3. Move CPU-intensive operations to worker_threads (crypto, compression, parsing).
            4. Review use of process.nextTick() and Promise chains for excessive microtask queuing.
            5. Consider horizontal scaling to distribute the load across more Node.js instances.
          dashboard_url: "http://localhost:3000/d/enterprise-nodejs-runtime"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "nodejs_eventloop_lag_seconds * 1000"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [500], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold

      # -----------------------------------------------------------------------
      # 10. Node.js High CPU Usage — WARNING (>80%)
      # -----------------------------------------------------------------------
      - uid: rule-nodejs-cpu-warning
        title: NodeJSHighCPUUsage
        condition: C
        for: 5m
        isPaused: false
        noDataState: NoData
        execErrState: Error
        labels:
          severity: warning
        annotations:
          dashboard_name: Node.js Runtime Monitoring
          host: "{{ $labels.instance }}"
          summary: "Node.js process CPU usage high on {{ $labels.instance }} (>80%)"
          description: "Node.js process on {{ $labels.instance }} is using more than 80% CPU."
          root_cause: >
            The Node.js process on {{ $labels.instance }} is using over 80% of a CPU core.
            Since Node.js is single-threaded for JavaScript execution, high CPU usage means
            the event loop is continuously busy with CPU-bound tasks, leaving insufficient
            time to process I/O events and handle new requests. This causes event loop lag
            and request queuing.
          action_item: >
            1. Profile the application: node --prof app.js and process with node --prof-process.
            2. Use clinic.js flame to visualize hot functions.
            3. Identify if the spike is caused by a specific request pattern or background task.
            4. Move CPU-heavy computations to worker_threads or a dedicated worker service.
            5. Consider enabling Node.js cluster mode to use multiple CPU cores.
          dashboard_url: "http://localhost:3000/d/enterprise-nodejs-runtime"
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus-uid
            model:
              datasource: {type: prometheus, uid: prometheus-uid}
              expr: "rate(process_cpu_seconds_total{job=~\"nodejs.*\"}[5m]) * 100"
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator: {params: [80], type: gt}
                  operator: {type: and}
                  query: {params: [A]}
                  reducer: {type: last, params: []}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              refId: C
              type: threshold
