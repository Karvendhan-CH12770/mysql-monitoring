apiVersion: 1

# =============================================================================
# Dashboard Providers
#
# WINDOWS SELF-HOSTED:
#   After copying files to Grafana, the path below must match where you
#   copied the provisioning folder.
#   Default Grafana install:
#     C:\monitoring\grafana\provisioning\dashboards\...
#
# DOCKER:
#   Replace paths with:  /etc/grafana/provisioning/dashboards/...
# =============================================================================

providers:

  - name: 'infra'
    orgId: 1
    folder: 'Infrastructure'
    folderUid: 'infra'
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    options:
      path: C:\monitoring\grafana\provisioning\dashboards\infra

  - name: 'application'
    orgId: 1
    folder: 'Application'
    folderUid: 'application'
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    options:
      path: C:\monitoring\grafana\provisioning\dashboards\application

  - name: 'database'
    orgId: 1
    folder: 'Database'
    folderUid: 'database'
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    options:
      path: C:\monitoring\grafana\provisioning\dashboards\database

  - name: 'node-js'
    orgId: 1
    folder: 'Node.js'
    folderUid: 'node-js'
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    options:
      path: C:\monitoring\grafana\provisioning\dashboards\node-js

  - name: 'alerting'
    orgId: 1
    folder: 'Alerting'
    folderUid: 'alerting'
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    options:
      path: C:\monitoring\grafana\provisioning\dashboards\alerting
