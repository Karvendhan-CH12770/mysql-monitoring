global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    monitor: 'central-prometheus'

# =============================================================================
# TEAM LABEL DESIGN
# =============================================================================
# The `team` label on every scrape target is the KEY that drives alert routing.
#
#   prometheus.yml  →  team label on metric  →  alert fires with team label
#   →  Grafana routes to matching contact point  →  team receives email
#
# Team values used across all jobs:
#   apache-team   → Apache web server owners
#   web-team      → Nginx web server owners
#   dba-team      → MySQL / MSSQL / PostgreSQL database owners
#   infra-team    → Windows & Linux infrastructure owners
#   nodejs-team   → Node.js application owners
#   platform      → Prometheus / monitoring platform owners
#
# To assign a new server to a team: set  team: '<team-name>'
# under its target labels. That server's alerts will automatically
# route to that team's email — no alert rule changes needed.
# =============================================================================

# Grafana Unified Alerting manages its own built-in Alertmanager.
# The external alertmanager block below is kept for reference only.
alerting:
  alertmanagers:
    - static_configs:
        - targets: []    # empty — Grafana Unified Alerting is used instead

rule_files: []            # alert rules are provisioned via Grafana, not here

scrape_configs:

  # ============================================================
  # Prometheus self-monitoring
  # ============================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          server_name: 'monitoring-server'
          team: 'platform'

  # ============================================================
  # Windows Servers — windows_exporter :9182
  # team: infra-team → alerts go to infra-team@yourcompany.com
  # Add more servers by copying the {} block under targets
  # ============================================================
  - job_name: 'windows_servers'
    static_configs:
      - targets: ['13.71.103.139:9182']
        labels:
          server_name: 'LMS-139'
          environment: 'production'
          team: 'infra-team'
          os: 'windows'

      # - targets: ['10.180.16.228:9182']
      #   labels:
      #     server_name: 'app-server-02'
      #     environment: 'production'
      #     team: 'infra-team'
      #     os: 'windows'

  # ============================================================
  # Linux Ubuntu Servers — node_exporter :9100
  # team: infra-team → alerts go to infra-team@yourcompany.com
  # ============================================================
  - job_name: 'linux_servers'
    static_configs:
      - targets: ['20.9.57.243:9100']
        labels:
          server_name: 'corrodlp-app-server'
          environment: 'production'
          team: 'infra-team'
          os: 'linux'

      # - targets: ['10.x.x.x:9100']
      #   labels:
      #     server_name: 'app-server-02'
      #     environment: 'production'
      #     team: 'infra-team'
      #     os: 'linux'

  # ============================================================
  # Nginx — nginx_exporter :9113
  # team: web-team → alerts go to web-team@yourcompany.com
  # ============================================================
  - job_name: 'nginx_servers'
    static_configs:
      - targets: ['20.9.57.243:9113']
        labels:
          server_name: 'corrodlp-app-server'
          environment: 'production'
          team: 'web-team'

      # - targets: ['10.x.x.x:9113']
      #   labels:
      #     server_name: 'app-server-02'
      #     environment: 'production'
      #     team: 'web-team'

  # ============================================================
  # PostgreSQL — postgres_exporter :9187
  # team: dba-team → alerts go to dba-team@yourcompany.com
  # ============================================================
  - job_name: 'postgres_servers'
    static_configs:
      - targets: ['20.9.57.243:9187']
        labels:
          server_name: 'corrodlp-db-server'
          environment: 'production'
          team: 'dba-team'

      # - targets: ['10.x.x.x:9187']
      #   labels:
      #     server_name: 'db-server-02'
      #     environment: 'production'
      #     team: 'dba-team'

  # ============================================================
  # Node.js Express Applications — :APP_PORT/metrics
  # team: nodejs-team → alerts go to nodejs-team@yourcompany.com
  # ============================================================
  - job_name: 'nodejs_applications'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['20.9.57.243:3001']
        labels:
          application: 'corrodlp-backend'
          server_name: 'corrodlp-app-server'
          environment: 'production'
          team: 'nodejs-team'

      # - targets: ['10.x.x.x:4000']
      #   labels:
      #     application: 'another-backend'
      #     server_name: 'app-server-02'
      #     environment: 'production'
      #     team: 'nodejs-team'

  # ============================================================
  # MSSQL — mssql_exporter :4000
  # team: dba-team → alerts go to dba-team@yourcompany.com
  # ============================================================
  - job_name: 'mssql_servers'
    static_configs:
      - targets: ['13.71.103.139:4000']
        labels:
          server_name: 'mssql-server-01'
          environment: 'production'
          team: 'dba-team'
          os: 'windows'

      # - targets: ['10.x.x.x:4000']
      #   labels:
      #     server_name: 'mssql-server-02'
      #     environment: 'production'
      #     team: 'dba-team'

  # ============================================================
  # MySQL — mysqld_exporter :9104
  # team: dba-team → alerts go to dba-team@yourcompany.com
  # ============================================================
  - job_name: 'mysql_servers'
    static_configs:
      - targets: ['13.71.103.139:9104']
        labels:
          server_name: 'mysql-server-01'
          environment: 'production'
          team: 'dba-team'
          os: 'windows'

      # - targets: ['10.x.x.x:9104']
      #   labels:
      #     server_name: 'mysql-server-02'
      #     environment: 'production'
      #     team: 'dba-team'

  # ============================================================
  # Apache — apache_exporter :9117
  # team: apache-team → alerts go to apache-team@yourcompany.com
  # ============================================================
  - job_name: 'apache_servers'
    static_configs:
      - targets: ['13.71.103.139:9117']
        labels:
          server_name: 'apache-server-01'
          environment: 'production'
          team: 'apache-team'
          os: 'windows'

      # - targets: ['10.x.x.x:9117']
      #   labels:
      #     server_name: 'apache-server-02'
      #     environment: 'production'
      #     team: 'apache-team'
      #     os: 'windows'
